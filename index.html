<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>JSON → PHP Array</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f8fa;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      margin-bottom: 10px;
      font-family: monospace;
      padding: 10px;
    }
    pre {
      background: #fff;
      padding: 10px;
      border: 1px solid #ddd;
      overflow-x: auto;
    }
    button {
      padding: 8px 12px;
      margin-right: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>JSON → PHP Array</h1>

<textarea id="jsonInput" placeholder="Вставь JSON сюда..."></textarea>

<div>
  <button onclick="convert()">Convert</button>
  <button onclick="copyResult()">Copy</button>
</div>

<pre id="output"></pre>

<script>
function jsonToPhp(value, indent = 0) {
  const space = '  '.repeat(indent);

  if (Array.isArray(value)) {
    if (value.length === 0) return '[]';

    let items = value.map(v => 
      space + '  ' + jsonToPhp(v, indent + 1)
    );

    return "[\n" + items.join(",\n") + "\n" + space + "]";
  }

  if (typeof value === 'object' && value !== null) {
    const keys = Object.keys(value);
    if (keys.length === 0) return '[]';

    let items = keys.map(k => {
      const key = `'${k.replace(/'/g, "\\'")}'`;
      const val = jsonToPhp(value[k], indent + 1);
      return space + '  ' + key + ' => ' + val;
    });

    return "[\n" + items.join(",\n") + "\n" + space + "]";
  }

  if (typeof value === 'string') {
    return `'${value.replace(/'/g, "\\'")}'`;
  }

  if (typeof value === 'number' || typeof value === 'boolean') {
    return String(value);
  }

  if (value === null) {
    return 'null';
  }

  return "null";
}

function convert() {
  const input = document.getElementById('jsonInput').value;
  const output = document.getElementById('output');

  try {
    const parsed = JSON.parse(input);
    const php = jsonToPhp(parsed);
    output.textContent = php;
  } catch (e) {
    output.textContent = 'Ошибка JSON: ' + e.message;
  }
}

function copyResult() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text)
    .then(() => alert('Скопировано!'))
    .catch(() => alert('Ошибка копирования'));
}
</script>

</body>
</html>
